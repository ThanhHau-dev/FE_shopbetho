<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <title>test</title>
  </head>
  <style>
    /* Áp dụng cho tất cả kích thước màn hình */
    .scroll-container {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch; /* cho cảm giác cuộn mượt trên iOS */
    }

    /* Đảm bảo mỗi cột có kích thước tối thiểu và không co lại */
    .scroll-container .col-item {
      min-width: 250px; /* điều chỉnh theo nhu cầu */
      flex-shrink: 0;
    }

    /* Khi màn hình rộng (trên 990px), bạn có thể cho phép wrap nếu muốn */
    @media (min-width: 990px) {
      .scroll-container {
        overflow-x: visible; /* hiển thị bình thường, không cần cuộn */
        flex-wrap: wrap;
      }
    }
  </style>
  <body>
    <div class="container">
      <div class="row">
        <div class="col-sm-12">
          <!-- Container cuộn ngang -->
          <div class="scroll-container d-flex flex-nowrap">
            <div class="col-item p-3 border">Cột 1</div>
            <div class="col-item p-3 border">Cột 2</div>
            <div class="col-item p-3 border">Cột 3</div>
            <div class="col-item p-3 border">Cột 4</div>
          </div>
        </div>
      </div>
    </div>

    <script></script>
  </body>
</html>
